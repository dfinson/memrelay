name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (editable, with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest
        run: pytest

  kuzu-fallback:
    # Back-compat fallback (#76, fork D-1): exercise the archived Kuzu backend in its
    # OWN job/process. Kuzu and Ladybug share one pybind11 extension and cannot co-load
    # in a single process, so the fallback cannot run inside the main (Ladybug) matrix —
    # it installs the optional `kuzu` extra and runs only the `kuzu`-marked tests here.
    name: kuzu fallback (py3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (editable, with dev + kuzu extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,kuzu]"

      - name: Pytest (kuzu fallback only)
        run: pytest -m kuzu
