name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (editable, with dev + cloud-backend extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,falkordb,neptune]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest
        run: pytest

  build-windows:
    # Windows regression coverage for issue #94: memory_recall routed through the
    # MCP stdio server hung over loopback while POSIX (unix socket) stayed green,
    # so the ubuntu matrix above could never have caught it. Dev extras only — the
    # optional cloud backends (falkordb/neptune) are out of scope here and their
    # two tests skip cleanly when absent, exactly as on a stock install.
    name: lint + test (windows-latest, py3.12)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (editable, with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest
        run: pytest

  first-run-smoke:
    name: first-run smoke (zero-config, no keys)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install the package the way a user would — a plain, NON-editable `pip install .`
      # with DEFAULT extras only (no dev/cloud backends). This proves the out-of-the-box,
      # key-less dependency set is self-sufficient and puts the real `memrelay` console
      # script on PATH. Packaging/wheel work stays in #20; this only exercises the install.
      - name: Install memrelay (default extras only)
        run: |
          python -m pip install --upgrade pip
          pip install .

      # No API keys and no host agent are configured on this runner; the driver also
      # scrubs its own environment of every *_API_KEY and hard-asserts none remain.
      - name: Run first-run smoke
        run: python scripts/first_run_smoke.py

  retrieval-eval:
    # E11-S4 (#21): deterministic, offline precision@k regression gate for recall quality.
    # Additive and self-contained — it consumes the shipped `engine.search` and never touches
    # the rest of the suite. A plain, NON-editable `pip install .` (DEFAULT extras only) proves
    # the gate needs no dev/cloud extras, no API keys, and no embedding-model download: the
    # harness injects a mock LLM + a deterministic offline embedder (see tests/eval/README.md).
    name: retrieval eval (precision@k gate, no keys)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Provision Ladybug's FTS extension into a stable, cacheable dir so the precision@k gate
      # is genuinely offline (rt-release / #153). The engine build otherwise fetches the FTS
      # extension from the CDN on a cold runner, which contradicts the "offline" claim and goes
      # red whenever the CDN is down (cf. the #114/#118 yank incidents). The harness
      # (tests/eval/_harness.py) and the runtime loader both read this via MEMRELAY_EXTENSION_DIR:
      # on a cache hit the whole job touches no network, and on a miss it warms exactly once in
      # the clearly-attributed "prefetch" step below (so a CDN blip reddens *that* step, not the
      # gate itself).
      MEMRELAY_EXTENSION_DIR: ${{ github.workspace }}/.memrelay-extensions

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Cache Ladybug FTS extension
        uses: actions/cache@v4
        with:
          path: ${{ env.MEMRELAY_EXTENSION_DIR }}
          # Keyed by dependency set (pyproject pins the Ladybug version that decides the
          # extension URL); restore-keys lets a prior cache seed the dir, which prefetch then
          # re-validates (a version bump just fetches the new build into the same dir).
          key: ladybug-fts-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ladybug-fts-${{ runner.os }}-

      - name: Install memrelay (default extras only)
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Prefetch Ladybug FTS extension (warm the offline cache)
        # Explicit, retryable, clearly-attributed network step: no-op on a cache hit, warms
        # MEMRELAY_EXTENSION_DIR once on a miss. prefetch_fts_extension() never raises.
        run: python -c "from memrelay.engine.backends._fts_extension import prefetch_fts_extension; prefetch_fts_extension()"

      - name: Enforce precision@k baseline
        run: python tests/eval/generate_baseline.py --check


