name: Release

# Packaging & PyPI release pipeline (#20 / E11-S5).
#
# What runs when:
#   * pull_request / push to main -> `build` + `install-verify` only. This is a
#     no-publish DRY RUN that proves `python -m build` yields a valid wheel + sdist and
#     that a clean-venv install of the BUILT WHEEL exposes a working `memrelay` console
#     script. The publish jobs are gated off, so nothing is ever published from a PR.
#   * workflow_dispatch -> the above, then `publish-testpypi` (a TestPyPI rehearsal).
#   * a published GitHub Release -> the above, then `publish-pypi` (the real release).
#
# Auth is PyPI Trusted Publishing (OIDC): no API-token secret is stored. The maintainer
# must register the trusted publisher on PyPI and TestPyPI out of band first, and create
# the `pypi` / `testpypi` GitHub Environments. See RELEASING.md.
#
# This pipeline is DISTINCT from ci.yml's `first-run-smoke`: that installs from SOURCE
# (`pip install .`) and drives the full daemon + MCP lifecycle; `install-verify` here
# installs the BUILT WHEEL ARTIFACT and only exercises the install-correctness surface.

on:
  pull_request:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      testpypi:
        description: "Publish the built artifacts to TestPyPI (dry-run rehearsal)."
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  # Cancel superseded PR builds, but never interrupt a push / release / dispatch run
  # (which may be mid-publish).
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: build (wheel + sdist)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build wheel + sdist
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: List artifacts
        run: ls -l dist/

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  install-verify:
    name: clean-env install of the built wheel
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Deliberately NO checkout: this job must exercise only the built artifact and the
      # installed console script, never the source tree.
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download built dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Install the wheel into a fresh venv (default extras only)
        run: |
          set -euo pipefail
          python -m venv "$RUNNER_TEMP/verify-venv"
          "$RUNNER_TEMP/verify-venv/bin/python" -m pip install --upgrade pip
          wheel="$(ls dist/*.whl)"
          echo "installing built wheel: $wheel"
          "$RUNNER_TEMP/verify-venv/bin/pip" install "$wheel"

      - name: Verify console script, metadata, and wheel completeness
        run: |
          set -euo pipefail
          venv="$RUNNER_TEMP/verify-venv"
          export PATH="$venv/bin:$PATH"

          # Metadata version recorded in the installed distribution.
          meta_version="$("$venv/bin/python" -c 'import importlib.metadata as m; print(m.version("memrelay"))')"
          echo "installed metadata version: $meta_version"

          # `memrelay --version` (the CLI's own report) must match the wheel metadata,
          # proving the single-source version wiring is intact end to end.
          cli_version="$(memrelay --version)"
          echo "console script reports: $cli_version"
          echo "$cli_version" | grep -qF "$meta_version" || {
            echo "::error::version mismatch: CLI '$cli_version' does not contain metadata '$meta_version'"
            exit 1
          }

          # The console script's help must render (exit 0), proving the entry point wires
          # up cleanly against the installed dependency closure.
          memrelay --help >/dev/null || {
            echo "::error::\`memrelay --help\` exited non-zero on the installed wheel"
            exit 1
          }

          # Wheel-completeness: importing every subpackage deterministically proves the
          # built wheel actually SHIPS them (catches any missing-subpackage regression in
          # the hatch build config) with no network and no model download.
          "$venv/bin/python" -c "import memrelay, memrelay.daemon, memrelay.engine, memrelay.engine.backends, memrelay.engine.llm, memrelay.ingest, memrelay.mcp, memrelay.providers" || {
            echo "::error::a memrelay subpackage is missing from the built wheel"
            exit 1
          }

          echo "clean-env install of the built wheel verified."

  publish-testpypi:
    name: publish to TestPyPI (dry-run rehearsal)
    if: github.event_name == 'workflow_dispatch' && inputs.testpypi
    needs: [build, install-verify]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write  # OIDC token for Trusted Publishing (no stored secret)
    steps:
      - name: Download built dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: publish to PyPI
    if: github.event_name == 'release'
    needs: [build, install-verify]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC token for Trusted Publishing (no stored secret)
    steps:
      - name: Download built dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
